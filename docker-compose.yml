services:
  product-service:
    build: ./apps/product-service
    container_name: product-service
    ports:
      - "3001:3001"
    networks:
      - microservices-net

  order-service:
    build: ./apps/order-service
    container_name: order-service
    ports:
      - "3002:3002"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:3001
    depends_on:
      - product-service
    networks:
      - microservices-net

  api-gateway:
    build: ./apps/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - ORDER_SERVICE_URL=http://order-service:3002
    depends_on:
      - product-service
      - order-service
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge